<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHOS — 그리스 신화 사전</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cinzel:wght@400;500;600;700&family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f4ecd8;
    --parchment-dark: #e8dcc0;
    --ink: #2a1f15;
    --ink-soft: #5a4838;
    --ink-faded: #8a7556;
    --gold: #b8893d;
    --gold-deep: #8b6420;
    --crimson: #7a2e1f;
    --bronze: #4a3520;
    --line: rgba(74, 53, 32, 0.25);
    --line-strong: rgba(74, 53, 32, 0.5);
    --pottery-black: #1a1410;

    --c-primordial: #6b5b47;
    --c-titan: #a67934;
    --c-olympian-1: #7a2e1f;
    --c-olympian-2: #2d5645;
    --c-special: #8b4567;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Noto Serif KR', 'Cormorant Garamond', serif;
    background: var(--parchment);
    color: var(--ink);
    background-image:
      radial-gradient(ellipse at top, rgba(184, 137, 61, 0.08), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(122, 46, 31, 0.06), transparent 60%),
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3CfeColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.12 0 0 0 0 0.08 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ============= APP SHELL ============= */
  .app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
  }

  /* ============= HEADER ============= */
  .header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(244, 236, 216, 0.92);
    backdrop-filter: blur(8px);
    z-index: 10;
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }

  .brand-mark {
    width: 38px;
    height: 38px;
    border: 1.5px solid var(--gold-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    color: var(--gold-deep);
    font-size: 18px;
    position: relative;
  }
  .brand-mark::before, .brand-mark::after {
    content: '';
    position: absolute;
    background: var(--gold-deep);
  }
  .brand-mark::before {
    width: 4px; height: 4px;
    top: -2.5px; left: -2.5px;
    box-shadow: 36px 0 0 var(--gold-deep), 0 36px 0 var(--gold-deep), 36px 36px 0 var(--gold-deep);
  }
  .brand-mark::after { display: none; }

  .brand-text { line-height: 1.1; }
  .brand-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    letter-spacing: 0.18em;
    font-size: 19px;
    color: var(--ink);
  }
  .brand-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faded);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  .header-meta {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-faded);
    text-align: right;
  }

  /* ============= SEARCH BAR ============= */
  .search-wrap {
    padding: 14px 24px 0;
    flex-shrink: 0;
    position: relative;
  }
  .search-box {
    position: relative;
    border-bottom: 1px solid var(--line-strong);
    transition: border-color 0.2s ease;
  }
  .search-box:focus-within { border-color: var(--gold-deep); }

  .search-icon {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-faded);
    font-family: 'Cinzel', serif;
    font-size: 14px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    padding: 12px 30px 12px 26px;
    font-family: 'Noto Serif KR', 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .search-input::placeholder {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-faded);
    letter-spacing: 0.05em;
    font-size: 15px;
  }

  .search-clear {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--ink-faded);
    font-size: 20px;
    line-height: 1;
    padding: 4px;
    display: none;
  }
  .search-clear:hover { color: var(--ink); }
  .search-box.has-value .search-clear { display: block; }

  .search-meta {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--ink-faded);
    margin-top: 6px;
    text-transform: uppercase;
    min-height: 14px;
  }

  /* ============= TAB FILTER ============= */
  .filters {
    padding: 12px 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--line);
    padding: 8px 16px;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }
  .filter-btn:hover {
    border-color: var(--gold-deep);
    color: var(--ink);
  }
  .filter-btn.active {
    background: var(--ink);
    color: var(--parchment);
    border-color: var(--ink);
  }

  /* ============= VIEW SYSTEM ============= */
  .view-stack {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .view {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.4s ease;
    background: var(--parchment);
    background-image:
      radial-gradient(ellipse at top, rgba(184, 137, 61, 0.08), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(122, 46, 31, 0.06), transparent 60%),
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3CfeColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.12 0 0 0 0 0.08 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .view-tree { transform: translateX(0); }
  .view-detail {
    transform: translateX(100%);
    pointer-events: none;
  }

  .app[data-view="detail"] .view-tree {
    transform: translateX(-30%);
    pointer-events: none;
  }
  .app[data-view="detail"] .view-detail {
    transform: translateX(0);
    pointer-events: auto;
  }

  /* ============= TREE VIEW ============= */
  .tree-content {
    padding: 28px 24px 60px;
  }

  .tier {
    margin-bottom: 36px;
    position: relative;
  }

  .tier-label {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--ink-faded);
    margin-bottom: 4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tier-label::before, .tier-label::after {
    content: '';
    height: 1px;
    background: var(--line);
    flex: 1;
  }
  .tier-label::before { max-width: 20px; }

  .tier-greek {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-faded);
    text-align: center;
    margin-bottom: 18px;
    letter-spacing: 0.05em;
  }

  .nodes {
    display: grid;
    gap: 12px;
  }
  .nodes.cols-1 { grid-template-columns: 1fr; max-width: 240px; margin: 0 auto; }
  .nodes.cols-2 { grid-template-columns: repeat(2, 1fr); max-width: 480px; margin: 0 auto; }
  .nodes.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .nodes.cols-4 { grid-template-columns: repeat(2, 1fr); }
  @media (min-width: 600px) {
    .nodes.cols-4 { grid-template-columns: repeat(4, 1fr); }
  }

  .god-card {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(180, 140, 95, 0.55), transparent 55%),
      radial-gradient(ellipse at 70% 85%, rgba(80, 58, 40, 0.5), transparent 50%),
      linear-gradient(135deg, #7d6448 0%, #4d3a2a 100%);
    border-top: 1px solid rgba(255, 230, 180, 0.55);
    border-left: 1px solid rgba(255, 230, 180, 0.35);
    border-right: 1px solid rgba(0, 0, 0, 0.4);
    border-bottom: 1px solid rgba(0, 0, 0, 0.55);
    padding: 20px 12px 16px;
    cursor: pointer;
    position: relative;
    transition: all 0.15s ease;
    text-align: center;
    overflow: hidden;
    box-shadow:
      inset 1px 1px 0 rgba(255, 230, 180, 0.35),
      inset 2px 2px 4px rgba(255, 230, 180, 0.1),
      inset -1px -1px 0 rgba(0, 0, 0, 0.4),
      inset -2px -2px 6px rgba(0, 0, 0, 0.35),
      0 4px 8px rgba(0, 0, 0, 0.3),
      0 6px 14px rgba(0, 0, 0, 0.22),
      0 1px 0 rgba(0, 0, 0, 0.25);
  }

  /* Marble texture overlay */
  .god-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='m'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' seed='4'/%3E%3CfeColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.85 0 0 0 0 0.65 0 0 0 0.06 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23m)'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.7;
    z-index: 0;
  }
  .god-card > * { position: relative; z-index: 1; }

  .symbol-icon {
    width: 44px;
    height: 44px;
    margin: 0 auto 10px;
    display: block;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 0 6px rgba(255, 200, 120, 0.3));
  }

  .god-card:hover .symbol-icon {
    transform: scale(1.08);
  }

  /* Color accent strip on top */
  .god-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 3px;
    background: var(--accent, var(--gold));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: 2;
  }

  .god-card:hover {
    transform: translateY(-4px);
    box-shadow:
      inset 1px 1px 0 rgba(255, 230, 180, 0.45),
      inset 2px 2px 4px rgba(255, 230, 180, 0.15),
      inset -1px -1px 0 rgba(0, 0, 0, 0.4),
      inset -2px -2px 6px rgba(0, 0, 0, 0.35),
      0 10px 20px rgba(0, 0, 0, 0.4),
      0 14px 28px rgba(0, 0, 0, 0.25),
      0 0 0 1px var(--accent, var(--gold));
  }
  .god-card:hover::before { transform: scaleX(1); }

  .god-card:active {
    transform: translateY(-1px);
    box-shadow:
      inset 1px 1px 0 rgba(255, 220, 160, 0.2),
      inset -1px -1px 0 rgba(0, 0, 0, 0.4),
      0 2px 4px rgba(0, 0, 0, 0.3);
  }

  .god-card[data-gen="primordial"] { --accent: var(--c-primordial); }
  .god-card[data-gen="titan"] { --accent: var(--c-titan); }
  .god-card[data-gen="olympian-1"] { --accent: var(--c-olympian-1); }
  .god-card[data-gen="olympian-2"] { --accent: var(--c-olympian-2); }
  .god-card[data-gen="special"] { --accent: var(--c-special); }

  .app[data-filter]:not([data-filter="all"]) .god-card { opacity: 0.25; }
  .app[data-filter="primordial"] .god-card[data-gen="primordial"],
  .app[data-filter="titan"] .god-card[data-gen="titan"],
  .app[data-filter="olympian-1"] .god-card[data-gen="olympian-1"],
  .app[data-filter="olympian-2"] .god-card[data-gen="olympian-2"],
  .app[data-filter="special"] .god-card[data-gen="special"] {
    opacity: 1;
  }

  .god-name-kr {
    font-family: 'Noto Serif KR', serif;
    font-weight: 600;
    font-size: 18px;
    color: #f8ebc8;
    letter-spacing: 0.02em;
  }
  .god-name-en {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(248, 235, 200, 0.8);
    margin-top: 5px;
    text-transform: uppercase;
  }
  .god-roman {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 13px;
    color: #e8be60;
    margin-top: 3px;
    letter-spacing: 0.05em;
  }
  .god-roman::before { content: '— '; opacity: 0.6; }
  .god-roman::after { content: ' —'; opacity: 0.6; }

  .god-domain {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(248, 235, 200, 0.85);
    margin-top: 8px;
  }

  .god-mother {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 12px;
    color: #e8be60;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed rgba(255, 230, 180, 0.25);
    letter-spacing: 0.03em;
  }

  /* Search highlighting */
  .god-card.match {
    border-color: var(--accent, var(--gold-deep)) !important;
    background: rgba(255, 252, 240, 0.95);
    box-shadow: 0 2px 0 var(--accent, var(--gold-deep));
  }
  .god-card.match::before { transform: scaleX(1); }

  .god-card mark {
    background: rgba(184, 137, 61, 0.25);
    color: inherit;
    padding: 0 2px;
    border-radius: 2px;
  }

  .app[data-search="active"] .god-card:not(.match) {
    opacity: 0.2;
    pointer-events: none;
  }
  .app[data-search="active"] .lineage,
  .app[data-search="active"] .tier-greek {
    opacity: 0.3;
  }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    display: none;
  }
  .app[data-search="empty"] .empty-state { display: block; }
  .app[data-search="empty"] .tier { display: none; }
  .app[data-search="empty"] .lineage { display: none; }

  .empty-omega {
    font-family: 'Cinzel', serif;
    font-size: 48px;
    color: var(--gold);
    opacity: 0.4;
    margin-bottom: 20px;
  }
  .empty-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .empty-hint {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-faded);
    text-transform: uppercase;
  }

  .lineage {
    position: relative;
    height: 28px;
    margin: -6px 0;
  }
  .lineage::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--line-strong);
  }
  .lineage-label {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--parchment);
    padding: 0 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faded);
    letter-spacing: 0.05em;
  }

  /* ============= DETAIL VIEW ============= */
  .detail-content {
    padding: 0 0 60px;
  }

  /* God portrait image - shown only if image exists */
  .god-portrait {
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
    padding: 32px 28px 8px;
    display: none;
  }
  .god-portrait.has-image { display: block; }

  .portrait-frame {
    position: relative;
    width: 100%;
    padding: 14px;
    background:
      linear-gradient(135deg, rgba(255, 252, 240, 0.5), rgba(232, 220, 192, 0.3));
    border: 1px solid var(--gold-deep);
    box-shadow:
      0 0 0 1px rgba(244, 236, 216, 0.8),
      0 0 0 3px var(--gold),
      0 0 0 4px rgba(139, 100, 32, 0.4),
      0 4px 20px rgba(74, 53, 32, 0.15);
  }

  .portrait-frame::before, .portrait-frame::after {
    content: '';
    position: absolute;
    left: 8px; right: 8px;
    height: 8px;
    background-image: repeating-linear-gradient(
      90deg,
      var(--gold-deep) 0, var(--gold-deep) 1px,
      transparent 1px, transparent 3px,
      var(--gold-deep) 3px, var(--gold-deep) 4px,
      transparent 4px, transparent 8px
    );
    opacity: 0.5;
  }
  .portrait-frame::before { top: 3px; }
  .portrait-frame::after { bottom: 3px; }

  .portrait-frame img {
    width: 100%;
    height: auto;
    display: block;
    position: relative;
  }

  /* Corner ornaments */
  .portrait-corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--gold-deep);
  }
  .portrait-corner.tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .portrait-corner.tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
  .portrait-corner.bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
  .portrait-corner.br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  .portrait-caption {
    text-align: center;
    margin-top: 16px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-faded);
    letter-spacing: 0.05em;
  }
  .portrait-caption::before, .portrait-caption::after {
    content: '※';
    color: var(--gold);
    font-style: normal;
    margin: 0 8px;
    opacity: 0.6;
  }

  .detail-back {
    position: sticky;
    top: 0;
    z-index: 5;
    background: rgba(244, 236, 216, 0.95);
    backdrop-filter: blur(8px);
    padding: 16px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-soft);
    border: none;
    width: 100%;
    text-align: left;
    text-transform: uppercase;
  }
  .detail-back:hover { color: var(--ink); }

  .detail-hero {
    padding: 40px 28px 32px;
    text-align: center;
    border-bottom: 1px solid var(--line);
    position: relative;
  }

  .detail-hero::before {
    content: '※';
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    color: var(--gold);
  }

  .detail-tier {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--accent, var(--gold-deep));
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .detail-name {
    font-family: 'Noto Serif KR', serif;
    font-weight: 700;
    font-size: 48px;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .detail-greek {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 24px;
    color: var(--ink-soft);
    margin-top: 12px;
  }

  .detail-roman {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--ink-faded);
    margin-top: 16px;
    text-transform: uppercase;
  }

  .detail-divider {
    margin: 24px auto 0;
    width: 60px;
    height: 1px;
    background: var(--gold);
    position: relative;
  }
  .detail-divider::before, .detail-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 5px;
    height: 5px;
    background: var(--gold);
    transform: translateY(-50%) rotate(45deg);
  }

<div class="app" id="app" data-view="tree" data-filter="all">

  <header class="header">
    <div class="brand" onclick="goHome()">
      <div class="brand-mark">Ω</div>
      <div class="brand-text">
        <div class="brand-title">MYTHOS</div>
        <div class="brand-sub">— a dictionary of greek gods —</div>
      </div>
    </div>
    <div class="header-meta">
      VOL. I<br>
      <span style="opacity: 0.6">Θεογονία</span>
    </div>
  </header>

  <div class="search-wrap">
    <div class="search-box" id="search-box">
      <span class="search-icon">⚲</span>
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="신의 이름을 찾으세요 — 제우스, Zeus, Iuppiter, 하늘…"

        spellcheck="false"
      >
      <button class="search-clear" id="search-clear" onclick="clearSearch()" aria-label="검색 지우기">×</button>
    </div>
    <div class="search-meta" id="search-meta"></div>
  </div>

  <nav class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">ALL</button>
    <button class="filter-btn" data-filter="primordial" onclick="setFilter('primordial')">PRIMORDIAL</button>
    <button class="filter-btn" data-filter="titan" onclick="setFilter('titan')">TITANS</button>
    <button class="filter-btn" data-filter="olympian-1" onclick="setFilter('olympian-1')">OLYMPIAN · I</button>
    <button class="filter-btn" data-filter="olympian-2" onclick="setFilter('olympian-2')">OLYMPIAN · II</button>
  </nav>

  <div class="view-stack">

    <!-- ============== TREE VIEW ============== -->
    <main class="view view-tree" id="tree-view">
      <div class="tree-content" id="tree-container"></div>
      <div class="empty-state">
        <div class="empty-omega">∅</div>
        <div class="empty-text" id="empty-text">검색 결과가 없습니다</div>
        <div class="empty-hint">try another name</div>

    </main>

    <!-- ============== DETAIL VIEW ============== -->
    <section class="view view-detail" id="detail-view">
      <button class="detail-back" onclick="goBack()">← 가계도로 돌아가기</button>
      <div class="detail-content" id="detail-container"></div>
    </section>

  </div>
</div>

<!-- ============== LIGHTBOX ============== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox(null, true)">CLOSE ×</button>
  <div class="lightbox-content" onclick="event.stopPropagation()">
    <img id="lb-img" src="" alt="">
    <div class="lightbox-caption">
      <div class="title" id="lb-title"></div>
      <div class="title-en" id="lb-title-en"></div>
      <div class="meta" id="lb-meta"></div>
      <div class="desc" id="lb-desc"></div>
    </div>
  </div>
</div>

// ============= RENDER =============
function renderTree() {
  const c = document.getElementById('tree-container');
  let html = '';

  treeStructure.forEach(item => {
    if (item.lineage) {
      html += `<div class="lineage"><span class="lineage-label">${item.lineage}</span></div>`;
    } else {
      html += `<div class="tier">
        <div class="tier-label">${item.tier}</div>
        <div class="tier-greek">${item.greek}</div>
        <div class="nodes cols-${item.cols}">`;
      item.nodes.forEach(name => {
        const g = gods[name];
        if (!g) return;
        // Brighter accent colors for warm brown background
        const sealColorMap = {
          'primordial': '#e0c8a0',    // warm light cream
          'titan': '#f5d588',         // bright amber
          'olympian-1': '#ffd478',    // bright gold
          'olympian-2': '#d4f0dc',    // bright mint
          'special': '#f0c4d8'        // bright pink
        };
        const motherHtml = g.mother
          ? `<div class="god-mother">어머니 · ${g.mother}</div>`
          : '';
        html += `<button class="god-card" data-name="${name}" data-gen="${g.gen}" style="--accent: ${sealColorMap[g.gen]}" onclick="showGod('${name}')">
          ${makeSeal(name, sealColorMap[g.gen])}
          <div class="god-name-kr">${name}</div>
          <div class="god-name-en">${g.nameEn}</div>
          <div class="god-roman">${g.roman}</div>
          <div class="god-domain">${g.domain.split(',')[0]}</div>
          ${motherHtml}
        </button>`;
      });
      html += `</div></div>`;
    }
  });

  c.innerHTML = html;
}

function handleImageError(img, nameEn) {
  // Try .png as fallback in case file was uploaded as png
  if (!img.dataset.fallbackTried) {
    img.dataset.fallbackTried = '1';
    img.src = 'images/' + nameEn + '.png';
    return;
  }
  // Both failed - hide silently
  const portrait = img.closest('.god-portrait');
  if (portrait) portrait.remove();
}

function renderGallery(name) {
  const works = galleries[name];
  if (!works || works.length === 0) return '';

  const colClass = works.length === 1 ? 'cols-1' : works.length === 2 ? 'cols-2' : '';

  const itemsHtml = works.map((w, idx) => `
    <button class="artwork" onclick="openLightbox('${name}', ${idx})">
      <div class="artwork-image">
        <img src="${w.img}" alt="${w.title}" loading="lazy"
             onerror="this.closest('.artwork').style.display='none'">
      </div>
      <div class="artwork-info">
        <div class="artwork-title">${w.title}</div>
        <div class="artwork-title-en">${w.titleEn}</div>
        <div class="artwork-meta">
          <span>${w.meta.split(' · ')[0] || ''}</span>
          <span>${w.meta.split(' · ')[1] || ''}</span>
        </div>
      </div>
    </button>
  `).join('');

  return `
    <div class="detail-section detail-gallery">
      <div class="gallery-header">
        <div class="section-title" style="border-bottom: none; padding-bottom: 0; margin-bottom: 6px; justify-content: center;">
          <span class="section-num">IV.</span> 명작 갤러리 — In Arte
        </div>
        <div class="gallery-sub">${name}을(를) 그린 역대 명작</div>
        <div class="gallery-divider"></div>
      </div>
      <div class="gallery-grid ${colClass}">
        ${itemsHtml}
      </div>
    </div>
  `;
}

function openLightbox(godName, idx) {
  const work = galleries[godName][idx];
  if (!work) return;
  document.getElementById('lb-img').src = work.img;
  document.getElementById('lb-title').textContent = work.title;
  document.getElementById('lb-title-en').textContent = work.titleEn;
  document.getElementById('lb-meta').textContent = work.meta;
  document.getElementById('lb-desc').textContent = work.desc;
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(event, force) {
  if (force || !event || event.target.id === 'lightbox') {
    document.getElementById('lightbox').classList.remove('active');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const lb = document.getElementById('lightbox');
    if (lb && lb.classList.contains('active')) {
      lb.classList.remove('active');
    }
  }
});

function showGod(name) {
  const g = gods[name];
  if (!g) return;

  const accentMap = {
    'primordial': 'var(--c-primordial)',
    'titan': 'var(--c-titan)',
    'olympian-1': 'var(--c-olympian-1)',
    'olympian-2': 'var(--c-olympian-2)',
    'special': 'var(--c-special)'
  };

  let relationsHtml = '';
  for (const [label, items] of Object.entries(g.relations)) {
    const itemsHtml = items.map(item => {
      const cleanName = item.split(' (')[0];
      if (gods[cleanName]) {
        return `<span class="relation-link" onclick="showGod('${cleanName}')">${item}</span>`;
      }
      return item;
    }).join(' · ');
    relationsHtml += `<div class="relation-row">
      <div class="relation-label">${label}</div>
      <div class="relation-value">${itemsHtml}</div>
    </div>`;
  }

  document.getElementById('detail-container').innerHTML = `
    <div class="god-portrait" id="portrait-${name}">
      <div class="portrait-frame">
        <span class="portrait-corner tl"></span>
        <span class="portrait-corner tr"></span>
        <span class="portrait-corner bl"></span>
        <span class="portrait-corner br"></span>
        <img
          src="images/${g.nameEn}.jpg"
          alt="${name}"
          onload="this.closest('.god-portrait').classList.add('has-image')"
          onerror="handleImageError(this, '${g.nameEn}')"
        >
      </div>
      <div class="portrait-caption">${g.epithet}</div>
    </div>

    <div class="detail-hero" style="--accent: ${accentMap[g.gen]}">
      <div class="detail-tier">${g.tier}</div>
      <h1 class="detail-name">${name}</h1>
      <div class="detail-greek">${g.greek} · ${g.epithet}</div>
      <div class="detail-roman">Roman · ${g.roman}</div>
      <div class="detail-divider"></div>
    </div>

    <div class="detail-body">
      <div class="detail-attributes">
        <div class="attr">
          <div class="attr-label">Domain</div>
          <div class="attr-value">${g.domain}</div>
        </div>
        <div class="attr">
          <div class="attr-label">Symbol</div>
          <div class="attr-value">${g.symbol}</div>
        </div>
      </div>

      <div class="detail-section">
        <div class="section-title"><span class="section-num">I.</span> 본질 — De Natura</div>
        <p class="detail-text">${g.desc}</p>
      </div>

      <div class="detail-section">
        <div class="section-title"><span class="section-num">II.</span> 신화 — Mythos</div>
        <p class="detail-text">${g.story}</p>
      </div>

      <div class="detail-section">
        <div class="section-title"><span class="section-num">III.</span> 가족 관계 — Genealogia</div>
        <div class="relations">${relationsHtml}</div>
      </div>

      ${renderGallery(name)}

      <div class="ornament">❦ ❦ ❦</div>
    </div>
  `;

  const view = document.getElementById('detail-view');
  view.scrollTop = 0;
  document.getElementById('app').dataset.view = 'detail';
}

function goBack() {
  document.getElementById('app').dataset.view = 'tree';
}

function goHome() {
  goBack();
  setFilter('all');
  if (typeof clearSearch === 'function') clearSearch();
}

function setFilter(filter) {
  document.getElementById('app').dataset.filter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
}

// ============= SEARCH =============
const searchInput = document.getElementById('search-input');
const searchBox = document.getElementById('search-box');
const searchMeta = document.getElementById('search-meta');
const emptyText = document.getElementById('empty-text');

function normalize(str) {
  return (str || '').toString().toLowerCase().trim();
}

function highlightMatch(text, query) {
  if (!query) return text;
  const q = normalize(query);
  const lower = text.toLowerCase();
  const idx = lower.indexOf(q);
  if (idx === -1) return text;
  return text.slice(0, idx) +
    '<mark>' + text.slice(idx, idx + q.length) + '</mark>' +
    text.slice(idx + q.length);
}

function searchGods(query) {
  const q = normalize(query);
  const app = document.getElementById('app');

  // Reset all cards first
  document.querySelectorAll('.god-card').forEach(card => {
    card.classList.remove('match');
    const name = card.dataset.name;
    const g = gods[name];
    if (!g) return;
    // Reset to original text
    card.querySelector('.god-name-kr').innerHTML = name;
    card.querySelector('.god-name-en').innerHTML = g.nameEn;
    card.querySelector('.god-roman').innerHTML = g.roman;
    card.querySelector('.god-domain').innerHTML = g.domain.split(',')[0];
    const motherEl = card.querySelector('.god-mother');
    if (motherEl && g.mother) {
      motherEl.innerHTML = '어머니 · ' + g.mother;
    }
  });

  if (!q) {
    app.removeAttribute('data-search');
    searchBox.classList.remove('has-value');
    searchMeta.textContent = '';
    return;
  }

  searchBox.classList.add('has-value');

  // Find matches across multiple fields
  let matchCount = 0;
  document.querySelectorAll('.god-card').forEach(card => {
    const name = card.dataset.name;
    const g = gods[name];
    if (!g) return;

    const fields = {
      kr: name,
      en: g.nameEn,
      roman: g.roman,
      greek: g.greek,
      domain: g.domain,
      epithet: g.epithet,
      mother: g.mother || ''
    };

    const matched = Object.values(fields).some(f =>
      normalize(f).includes(q)
    );

    if (matched) {
      card.classList.add('match');
      matchCount++;
      // Highlight in visible fields
      if (normalize(name).includes(q)) {
        card.querySelector('.god-name-kr').innerHTML = highlightMatch(name, q);
      }
      if (normalize(g.nameEn).includes(q)) {
        card.querySelector('.god-name-en').innerHTML = highlightMatch(g.nameEn, q);
      }
      if (normalize(g.roman).includes(q)) {
        card.querySelector('.god-roman').innerHTML = highlightMatch(g.roman, q);
      }
      const domainShort = g.domain.split(',')[0];
      if (normalize(domainShort).includes(q)) {
        card.querySelector('.god-domain').innerHTML = highlightMatch(domainShort, q);
      }
      if (g.mother && normalize(g.mother).includes(q)) {
        const motherEl = card.querySelector('.god-mother');
        if (motherEl) {
          motherEl.innerHTML = '어머니 · ' + highlightMatch(g.mother, q);
        }
      }
    }
  });

  if (matchCount === 0) {
    app.dataset.search = 'empty';
    emptyText.textContent = `"${query}"에 대한 결과가 없습니다`;
    searchMeta.textContent = 'no result';
  } else {
    app.dataset.search = 'active';
    searchMeta.textContent = `${matchCount} ${matchCount === 1 ? 'match' : 'matches'} found`;
  }
}

function clearSearch() {
  searchInput.value = '';
  searchGods('');
  searchInput.focus();
}

searchInput.addEventListener('input', e => searchGods(e.target.value));

// ESC to clear
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    clearSearch();
    searchInput.blur();
  }
});

renderTree();
</script>
